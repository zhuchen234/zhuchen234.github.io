<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>紫云英木盒包装厂</title>
  <style>
    :root{--ink:#17201d;--muted:#5d6a64;--line:#d9e0da;--paper:#f5f7f4;--green:#2d6b57;--green2:#1f5544;--card:#fff;--warn:#b46a28;--shadow:0 16px 42px rgba(33,44,38,.12)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--paper);color:var(--ink);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}
    button,input,select,textarea{font:inherit}
    .top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:14px 22px;background:rgba(245,247,244,.95);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
    .brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,.25),transparent 35%),repeating-linear-gradient(0deg,#b87939 0 8px,#d19a58 8px 14px,#9e672e 14px 18px);box-shadow:inset 0 0 0 2px rgba(94,57,24,.22)}
    h1,h2,p{margin:0}h1{font-size:clamp(20px,3vw,30px)}.brand p,.hint,.summary,.meta,.status{color:var(--muted)}
    .wrap{display:grid;grid-template-columns:minmax(280px,370px) minmax(380px,1fr) minmax(280px,340px);gap:18px;width:min(1500px,100%);margin:0 auto;padding:18px}
    .panel,.stage{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);min-width:0}.panel{padding:18px}.stage{display:flex;flex-direction:column;min-height:650px;overflow:hidden}
    .factory{padding:18px 12px 12px;text-align:center;font-size:clamp(24px,4vw,42px);font-weight:800}
    .canvasBox{position:relative;display:grid;place-items:center;flex:1;min-height:430px;padding:18px;background:radial-gradient(circle at 50% 34%,#fffaf0,rgba(255,255,255,.42) 42%,rgba(222,230,222,.66) 82%),repeating-linear-gradient(90deg,rgba(45,107,87,.06) 0 1px,transparent 1px 32px),repeating-linear-gradient(0deg,rgba(45,107,87,.06) 0 1px,transparent 1px 32px)}
    canvas{display:block;width:min(100%,760px);height:min(58vh,500px);min-height:320px;border-radius:8px;cursor:grab}canvas:active{cursor:grabbing}
    .controls{position:absolute;right:16px;bottom:16px;display:flex;gap:8px;padding:8px;border:1px solid rgba(215,222,216,.9);border-radius:8px;background:rgba(255,255,255,.84);backdrop-filter:blur(8px)}
    .meta{padding:14px 18px 18px;border-top:1px solid var(--line);text-align:center;line-height:1.7}.head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px}.head h2{font-size:18px}
    .field,.board label{display:grid;gap:7px;color:var(--muted);font-size:13px}.field+.field{margin-top:12px}
    input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);border-radius:6px;padding:9px 11px;background:#fff;color:var(--ink);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,107,87,.14)}textarea{resize:vertical}
    .inline{display:grid;grid-template-columns:1fr auto;gap:8px}button{min-height:42px;border:0;border-radius:6px;padding:9px 14px;color:#fff;background:var(--green);cursor:pointer}button:hover{background:var(--green2)}
    .ghost{border:1px solid var(--line);color:var(--green2);background:#fff}.ghost:hover{color:#fff;background:var(--green2)}
    .generate{width:100%;margin-top:14px;background:var(--warn)}.generate:hover{background:#93541d}
    .chips{display:flex;flex-wrap:wrap;gap:8px;min-height:34px;margin:10px 0 16px}.chip{min-height:32px;border:1px solid rgba(45,107,87,.28);border-radius:999px;padding:6px 10px;color:var(--green2);background:#edf5f1}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.boards{display:grid;gap:10px}.board{display:grid;grid-template-columns:72px 1fr 1fr;align-items:end;gap:10px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfcfa}.board strong{align-self:center}
    .summary{margin:16px 0;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfcfa;line-height:1.7}.actions{display:grid;grid-template-columns:1fr auto;gap:10px}.status{margin-top:8px;font-size:13px}
    @media(max-width:1120px){.wrap{grid-template-columns:minmax(280px,390px) 1fr}.stage{min-height:570px}.order{grid-column:1/-1}}
    @media(max-width:760px){.top{padding:12px}.logo{width:34px;height:34px}.wrap{grid-template-columns:1fr;padding:10px}.panel{padding:14px}.stage{order:-1;min-height:520px}.canvasBox{min-height:330px;padding:18px 10px}canvas{height:340px;min-height:300px}.controls{right:10px;bottom:10px;gap:6px;padding:6px}.grid,.inline,.actions{grid-template-columns:1fr}.board{grid-template-columns:1fr 1fr}.board strong{grid-column:1/-1}}
    @media print{.top,.ghost,#saveDraft,.generate{display:none}body{background:#fff}.wrap{display:block;padding:0}.panel,.stage{margin:0 0 14px;box-shadow:none}}
  </style>
</head>
<body>
  <header class="top"><div class="brand"><span class="logo"></span><div><h1>紫云英木盒包装厂</h1><p>无盖木盒下单配置</p></div></div><button class="ghost" id="reset" type="button">重置</button></header>
  <main class="wrap">
    <section class="panel"><div class="head"><h2>基础信息</h2><span class="hint">单位：mm</span></div>
      <label class="field"><span>木板选材</span><div class="inline"><input id="material" placeholder="例如：松木、桐木、榉木、樟子松"><button id="saveMaterial" type="button">保存</button></div></label>
      <div class="chips" id="chips"></div>
      <div class="grid"><label class="field"><span>底板长</span><input id="len" data-key="length" inputmode="decimal" value="50"></label><label class="field"><span>底板宽</span><input id="wid" data-key="width" inputmode="decimal" value="30"></label><label class="field"><span>盒身高</span><input id="hei" data-key="height" inputmode="decimal" value="24"></label><label class="field"><span>木板厚度</span><select id="thick"><option>3</option><option selected>5</option><option>8</option><option>10</option><option>12</option><option>15</option></select></label></div>
      <button class="generate" id="generate" type="button">生成木盒</button><p class="status" id="generateStatus">修改尺寸后，点击生成木盒刷新预览。</p>
      <div class="head" style="margin-top:22px"><h2>五块木板</h2><span class="hint">尺寸会同步到对应木板</span></div>
      <div class="boards"><article class="board"><strong>底板</strong><label>长<input data-board="bottom" data-key="length" inputmode="decimal"></label><label>宽<input data-board="bottom" data-key="width" inputmode="decimal"></label></article><article class="board"><strong>左侧板</strong><label>长<input data-board="left" data-key="length" inputmode="decimal"></label><label>高<input data-board="left" data-key="height" inputmode="decimal"></label></article><article class="board"><strong>右侧板</strong><label>长<input data-board="right" data-key="length" inputmode="decimal"></label><label>高<input data-board="right" data-key="height" inputmode="decimal"></label></article><article class="board"><strong>前板</strong><label>长<input data-board="front" data-key="length" inputmode="decimal"></label><label>高<input data-board="front" data-key="height" inputmode="decimal"></label></article><article class="board"><strong>后板</strong><label>长<input data-board="back" data-key="length" inputmode="decimal"></label><label>高<input data-board="back" data-key="height" inputmode="decimal"></label></article></div>
    </section>
    <section class="stage"><div class="factory">紫云英木盒包装厂</div><div class="canvasBox"><canvas id="box"></canvas><div class="controls"><button class="ghost" id="left" type="button">左转</button><button class="ghost" id="right" type="button">右转</button><button class="ghost" id="home" type="button">复位</button></div></div><div class="meta" id="meta"></div></section>
    <section class="panel order"><div class="head"><h2>订单草稿</h2><span id="status">未保存</span></div><label class="field"><span>客户姓名</span><input id="name" placeholder="请输入姓名"></label><label class="field"><span>联系电话</span><input id="phone" type="tel" placeholder="请输入电话"></label><label class="field"><span>数量</span><input id="qty" inputmode="numeric" value="100"></label><label class="field"><span>备注</span><textarea id="note" rows="4" placeholder="例如：倒角、打磨、logo、交期要求"></textarea></label><div class="summary" id="summary"></div><div class="actions"><button id="saveDraft" type="button">保存订单草稿</button><button class="ghost" id="printBtn" type="button">打印</button></div></section>
  </main>
  <script>
    const model={length:50,width:30,height:24,thickness:5,material:"",savedMaterials:[]};
    const draft={...model};
    const q=s=>document.querySelector(s),qa=s=>[...document.querySelectorAll(s)];
    let syncing=false,rot=-.72,drag=null;
    const el={len:q("#len"),wid:q("#wid"),hei:q("#hei"),thick:q("#thick"),mat:q("#material"),chips:q("#chips"),box:q("#box"),meta:q("#meta"),sum:q("#summary"),status:q("#status"),gen:q("#generateStatus"),name:q("#name"),phone:q("#phone"),qty:q("#qty"),note:q("#note")};
    const dims=["length","width","height"];
    function valid(v){if(String(v).trim()==="")return null;const n=Number(v);return Number.isFinite(n)&&n>0?n:null}
    function setDraft(k,v){if(v!==null)draft[k]=v}
    function save(){localStorage.setItem("woodbox-state",JSON.stringify({model,draft,savedMaterials:model.savedMaterials}))}
    function load(){try{const s=JSON.parse(localStorage.getItem("woodbox-state")||"{}");Object.assign(model,s.model||{});Object.assign(draft,s.draft||model);model.savedMaterials=s.savedMaterials||model.savedMaterials}catch{}try{const d=JSON.parse(localStorage.getItem("woodbox-draft")||"{}");el.name.value=d.name||"";el.phone.value=d.phone||"";el.qty.value=d.qty||100;el.note.value=d.note||""}catch{}}
    function syncInputs(skip){syncing=true;el.len.value=draft.length;el.wid.value=draft.width;el.hei.value=draft.height;el.thick.value=String(draft.thickness);el.mat.value=draft.material||"";qa("[data-board][data-key]").forEach(i=>{if(i===skip)return;const b=i.dataset.board,k=i.dataset.key;if(b==="bottom"&&k==="length")i.value=draft.length;if(b==="bottom"&&k==="width")i.value=draft.width;if((b==="left"||b==="right")&&k==="length")i.value=draft.length;if((b==="front"||b==="back")&&k==="length")i.value=draft.width;if(k==="height")i.value=draft.height});syncing=false}
    function renderChips(){el.chips.innerHTML="";if(!model.savedMaterials.length){const s=document.createElement("span");s.className="chip";s.textContent="暂无保存选材";el.chips.append(s);return}model.savedMaterials.forEach(m=>{const b=document.createElement("button");b.type="button";b.className="chip";b.textContent=m;b.onclick=()=>{draft.material=m;model.material=m;syncInputs();renderSummary();save()};el.chips.append(b)})}
    function renderSummary(){el.sum.innerHTML=`<strong>当前订单摘要</strong><br>木板选材：${model.material||draft.material||"未选择"}<br>底板：${model.width} × ${model.length} mm，左右侧板：${model.length} × ${model.height} mm，前后板：${model.width} × ${model.height} mm<br>木板厚度：${model.thickness} mm，数量：${valid(el.qty.value)||1} 个`}
    function renderMeta(){el.meta.innerHTML=[`底板：${model.width} × ${model.length} mm`,`左右侧板：${model.length} × ${model.height} mm`,`前后板：${model.width} × ${model.height} mm`,`厚度：${model.thickness} mm`].join("　")}
    function draw(){const c=el.box,r=c.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);c.width=Math.max(320,r.width)*d;c.height=Math.max(300,r.height)*d;const x=c.getContext("2d"),w=c.width/d,h=c.height/d;x.scale(d,d);x.clearRect(0,0,w,h);let bg=x.createRadialGradient(w*.5,h*.42,20,w*.5,h*.5,Math.max(w,h)*.72);bg.addColorStop(0,"#fffaf0");bg.addColorStop(.52,"#f3eadc");bg.addColorStop(1,"#e9efe9");x.fillStyle=bg;x.fillRect(0,0,w,h);
      const sc=Math.min(w*.62/model.length,h*.54/(model.width+model.height),5.4),L=model.length*sc,D=model.width*sc,H=Math.max(70,model.height*sc),T=Math.max(12,Math.min(28,model.thickness*sc)),co=Math.cos(rot),si=Math.sin(rot),ox=w/2,oy=h*.6+H*.16;
      const rp=(a,b)=>({x:a*co-b*si,z:a*si+b*co}),pr=p=>{const z=rp(p.x,p.z);return{x:ox+z.x,y:oy+z.z*.48-p.y,depth:z.z+p.y*.08}};
      function faces(a,b,c,d,e,f,al=1){const p={a:{x:a,y:c,z:e},b:{x:b,y:c,z:e},c:{x:b,y:c,z:f},d:{x:a,y:c,z:f},e:{x:a,y:d,z:e},ff:{x:b,y:d,z:e},g:{x:b,y:d,z:f},h:{x:a,y:d,z:f}};return[[p.e,p.ff,p.g,p.h,"#dfaa65",al],[p.a,p.b,p.ff,p.e,"#c1843d",al],[p.d,p.c,p.g,p.h,"#a96b30",al],[p.a,p.d,p.h,p.e,"#b97736",al],[p.b,p.c,p.g,p.ff,"#d19850",al]].map(A=>{const pts=A.slice(0,4).map(pr);return{pts,col:A[4],alpha:A[5],depth:pts.reduce((s,p)=>s+p.depth,0)/4}})}
      function grain(P){const xs=P.map(p=>p.x),ys=P.map(p=>p.y),mnx=Math.min(...xs)-20,mxx=Math.max(...xs)+20,mny=Math.min(...ys)-20,mxy=Math.max(...ys)+20;x.save();x.beginPath();P.forEach((p,i)=>i?x.lineTo(p.x,p.y):x.moveTo(p.x,p.y));x.closePath();x.clip();for(let y=mny;y<mxy;y+=22){x.beginPath();x.moveTo(mnx,y);for(let xx=mnx;xx<=mxx;xx+=30)x.quadraticCurveTo(xx+14,y+Math.sin((xx+y)*.04)*4,xx+30,y+Math.cos((xx-y)*.025)*3);x.strokeStyle="rgba(92,52,20,.13)";x.lineWidth=1.3;x.stroke()}x.restore()}
      function face(F){const P=F.pts;x.save();x.globalAlpha=F.alpha;x.beginPath();P.forEach((p,i)=>i?x.lineTo(p.x,p.y):x.moveTo(p.x,p.y));x.closePath();const g=x.createLinearGradient(P[0].x,P[0].y,P[2].x,P[2].y);g.addColorStop(0,"#f0c47f");g.addColorStop(.56,F.col);g.addColorStop(1,"#946026");x.fillStyle=g;x.fill();grain(P);x.strokeStyle="rgba(80,45,18,.28)";x.lineWidth=1.15;x.stroke();x.restore()}
      const hl=L/2,hd=D/2,sh=pr({x:0,y:0,z:0});x.save();x.translate(sh.x,sh.y+H*.18);x.rotate(rot*.15);let sg=x.createRadialGradient(0,0,20,0,0,Math.max(L,D)*.88);sg.addColorStop(0,"rgba(72,45,20,.20)");sg.addColorStop(1,"rgba(72,45,20,0)");x.fillStyle=sg;x.scale(1.3,.42);x.beginPath();x.arc(0,0,Math.max(L,D)*.82,0,Math.PI*2);x.fill();x.restore();
      [...faces(-hl,hl,0,T,-hd,hd),...faces(-hl,hl,T,H+T,-hd-T,-hd),...faces(-hl,hl,T,H+T,hd,hd+T),...faces(-hl-T,-hl,T,H+T,-hd-T,hd+T,.92),...faces(hl,hl+T,T,H+T,-hd-T,hd+T)].sort((a,b)=>a.depth-b.depth).forEach(face);
      const rim=[pr({x:-hl-T,y:H+T,z:-hd-T}),pr({x:hl+T,y:H+T,z:-hd-T}),pr({x:hl+T,y:H+T,z:hd+T}),pr({x:-hl-T,y:H+T,z:hd+T}),pr({x:-hl-T,y:H+T,z:-hd-T})];x.beginPath();rim.forEach((p,i)=>i?x.lineTo(p.x,p.y):x.moveTo(p.x,p.y));x.strokeStyle="rgba(82,47,20,.36)";x.lineWidth=2;x.lineJoin="round";x.stroke();
    }
    function generate(){for(const k of dims){const v=valid(draft[k]);if(v===null){el.gen.textContent="请先把长、宽、高填写完整，再生成木盒。";return}}Object.assign(model,{length:draft.length,width:draft.width,height:draft.height,thickness:draft.thickness,material:draft.material});draw();renderMeta();renderSummary();save();el.gen.textContent="已生成最新木盒预览。"}
    function boardInput(b,k,v){if(v===null)return;if(b==="bottom"&&k==="length")draft.length=v;if(b==="bottom"&&k==="width")draft.width=v;if((b==="left"||b==="right")&&k==="length")draft.length=v;if((b==="front"||b==="back")&&k==="length")draft.width=v;if(k==="height")draft.height=v}
    qa("[data-key]:not([data-board])").forEach(i=>i.oninput=()=>{if(syncing)return;setDraft(i.dataset.key,valid(i.value));syncInputs(i);el.gen.textContent="尺寸已修改，点击生成木盒刷新预览。";save()});
    qa("[data-board][data-key]").forEach(i=>i.oninput=()=>{if(syncing)return;boardInput(i.dataset.board,i.dataset.key,valid(i.value));syncInputs(i);el.gen.textContent="尺寸已修改，点击生成木盒刷新预览。";save()});
    el.thick.onchange=()=>{draft.thickness=valid(el.thick.value)||5;el.gen.textContent="厚度已修改，点击生成木盒刷新预览。";save()};
    el.mat.oninput=()=>{draft.material=el.mat.value.trim();model.material=draft.material;renderSummary();save()};
    q("#saveMaterial").onclick=()=>{const m=el.mat.value.trim();if(!m)return;draft.material=m;model.material=m;model.savedMaterials=[m,...model.savedMaterials.filter(x=>x!==m)].slice(0,8);renderChips();renderSummary();save()};
    q("#generate").onclick=generate;q("#reset").onclick=()=>{Object.assign(draft,{length:50,width:30,height:24,thickness:5,material:""});Object.assign(model,draft);syncInputs();generate()};q("#printBtn").onclick=()=>print();
    q("#saveDraft").onclick=()=>{const d={name:el.name.value.trim(),phone:el.phone.value.trim(),qty:valid(el.qty.value)||1,note:el.note.value.trim(),box:{...model},savedAt:new Date().toLocaleString("zh-CN")};localStorage.setItem("woodbox-draft",JSON.stringify(d));el.status.textContent=`已保存 ${d.savedAt}`};
    [el.name,el.phone,el.qty,el.note].forEach(i=>i.oninput=()=>{renderSummary();el.status.textContent="未保存"});
    q("#left").onclick=()=>{rot-=Math.PI/8;draw()};q("#right").onclick=()=>{rot+=Math.PI/8;draw()};q("#home").onclick=()=>{rot=-.72;draw()};
    el.box.onpointerdown=e=>{drag={x:e.clientX,rot};el.box.setPointerCapture(e.pointerId)};el.box.onpointermove=e=>{if(!drag)return;rot=drag.rot+(e.clientX-drag.x)*.01;draw()};el.box.onpointerup=()=>drag=null;el.box.onpointercancel=()=>drag=null;addEventListener("resize",draw);
    load();syncInputs();renderChips();generate();
  </script>
</body>
</html>
